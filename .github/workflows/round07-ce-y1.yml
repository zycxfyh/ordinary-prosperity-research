name: Round 7 CE Y1 cloud run

on:
  pull_request:
    paths:
      - '.github/workflows/round07-ce-y1.yml'
      - 'analysis/us-ce/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  estimate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: python -m pip install --upgrade pip pandas numpy

      - name: Download official BLS packages
        run: |
          mkdir -p data/raw/us-ce data/derived/us-ce/round07
          ua='Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 Chrome/150 Safari/537.36 research=https://github.com/zycxfyh/ordinary-prosperity-research'
          referer='https://www.bls.gov/cex/pumd_data.htm'
          set +e
          for yy in 22 23; do
            curl --fail --location --retry 3 --retry-all-errors \
              --user-agent "$ua" \
              --referer "$referer" \
              --header 'Accept: application/zip,application/octet-stream;q=0.9,*/*;q=0.8' \
              --output "data/raw/us-ce/intrvw${yy}.zip" \
              "https://www.bls.gov/cex/pumd/data/csv/intrvw${yy}.zip" \
              2>&1 | tee -a data/derived/us-ce/round07/download.log
            status=${PIPESTATUS[0]}
            if [ "$status" -ne 0 ]; then
              echo "$status" > data/derived/us-ce/round07/download_exit_status.txt
              exit 0
            fi
          done
          echo 0 > data/derived/us-ce/round07/download_exit_status.txt

      - name: Run preliminary CE Y1 estimate
        run: |
          mkdir -p data/derived/us-ce/round07
          download_status=$(cat data/derived/us-ce/round07/download_exit_status.txt)
          if [ "$download_status" -ne 0 ]; then
            echo "BLS download failed with status $download_status" | tee data/derived/us-ce/round07/execution.log
            echo "$download_status" > data/derived/us-ce/round07/exit_status.txt
            exit 0
          fi
          set +e
          python analysis/us-ce/round07_ce_y1.py \
            --target-year 2023 \
            --acknowledge-historical-tenure-codes \
            --output-dir data/derived/us-ce/round07 \
            2>&1 | tee data/derived/us-ce/round07/execution.log
          status=${PIPESTATUS[0]}
          echo "$status" > data/derived/us-ce/round07/exit_status.txt
          exit 0

      - name: Verify outputs and propagate status
        run: |
          status=$(cat data/derived/us-ce/round07/exit_status.txt)
          if [ "$status" -ne 0 ]; then
            echo "CE estimator failed with status $status"
            cat data/derived/us-ce/round07/download.log || true
            tail -n 120 data/derived/us-ce/round07/execution.log
            exit "$status"
          fi
          test -s data/derived/us-ce/round07/source_manifest.json
          test -s data/derived/us-ce/round07/preliminary_y1_estimates.csv
          test -s data/derived/us-ce/round07/audit_log.csv
          python - <<'PY'
          import pandas as pd
          p = 'data/derived/us-ce/round07/preliminary_y1_estimates.csv'
          df = pd.read_csv(p)
          print(df.to_string(index=False))
          assert not df.empty
          assert set(df['result_status']) == {'preliminary_interview_only'}
          PY

      - name: Upload aggregate-only artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: round07-ce-y1-preliminary
          path: |
            data/derived/us-ce/round07/source_manifest.json
            data/derived/us-ce/round07/preliminary_y1_estimates.csv
            data/derived/us-ce/round07/audit_log.csv
            data/derived/us-ce/round07/download.log
            data/derived/us-ce/round07/download_exit_status.txt
            data/derived/us-ce/round07/execution.log
            data/derived/us-ce/round07/exit_status.txt
          if-no-files-found: warn
          retention-days: 7
